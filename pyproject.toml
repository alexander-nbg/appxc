[project]
name = "appxf"
version = "0.0.3a0"
authors = [
  { name = "alexander-nbg", email="mail@alexander-nbg.de" }
]
description = "APPXF application (APP) cross functional concerns (XF)"
readme = "README.md"
requires-python = ">=3.10"
license="Apache-2.0"
license_file = "LICENSES/Apache-2.0"
classifiers = [
    "Programming Language :: Python :: 3"
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build]
exclude = [
  "/.*",
  "tests",
  "requirements_test.txt"
]

[project.entry-points.pyinstaller40]
hook-dirs = "appxf.pyinstaller:get_hook_dirs"

[tool.appxf]
# The testing sandbox is the root directory where files are placed that are
# needed or generated during test case. Each test case should use individual
# subfolders.
test-sandbox-root = "./.testing"

[tool.ruff]
# Note: Line length default is already 88. Minimum python version is taken from project
# configuration.

[tool.ruff.lint]
# Remark: The selected rules are not ciceled in stone. Start discussing, if there are
# good reasons to change.
select = ["ALL"]
ignore = [
  # TODO: The following rules are currently reviewed for planning or adequate
  # argumentation. They correspond to 1552 issues.
    "ARG",
  "BLE001",
  "C901",
  "COM812",
  "EM101", "EM102",
  "ERA001",
  "EXE001", "EXE003", "EXE005",
  "FBT001", "FBT002", "FBT003",
  "FIX002",
  "FURB110", "FURB171",
  "G004",
  "INP001",
  "LOG014",
  "PERF401",
  "PGH003",
  "PGH004",
  "PIE790",
  "PLC0415",
  "PLR",
  "PLW",
  "PT",
  "PTH",
  "PYI019", "PYI059",
  "RET",
  "RSE102",
  "SLF001",
  "T201",
  "TC001", "TC003", "TD002", "TD003",
  "TD004",
  "TRY",
  # TODO: The following rules still need to be resolved to conclude #12
  "DTZ", "ICN001",
  # Even if APPXF reaches a version 1.0.0, TODO remarks remain being allowed if a
  # corresponding ticket was created, is linked and still actove (TODO #42:). No other
  # tag should be used (other FIX rules).
  "FIX002",
  # No hard rules on code complexity. Complexity shall be rated by reviewers:
  "C901",
  # TODO: type annotations as well as docstring annotation should be mandatory for all
  # public functions. Further configuration like ignoring for tests and the section
  # [tool.ruff.lint.flake8-annotations] already added but rule is not enabled due to too
  # many open issues.
  "ANN", "D"
]

[tool.ruff.format]
# no specific settings here, yet

[tool.ruff.lint.flake8-annotations]
allow-star-arg-any = true
mypy-init-return = true
suppress-none-returning = true

[tool.ruff.lint.per-file-ignores]
# Unused imports in __init__.py are intentional re-exports.
"__init__.py" = ["F401"]
# TODO: This is a slight issue since in some occasions, it causes unwanted dependencies.
# Example: when storage activated FTP again, any usage of storage would also import the
# dependency to FTP. This is acceptable for now, but not on the long run. Despite the
# other solutions (adding to __all__ and maxing the re-imports explicit with [import XY
# as XY]), merging classes into appropriate longer module files would enable dropping
# the module facade in __init__.py

# Rules are relaxed for test case implementation which includes annotation and
# particularly the asserts
"tests*/**/*.py" = [
  "ANN",
  "S"  # No security checks for test code
  ]

# TODO: matema is generally in draft status and not usable. Disabling security schecks.
"src/appxf_matema/**/*.py" = [
  "S603", "S607"
]

# TODO: development scripts are not part of the shipped library and are only running
# locally and within CI (not in user applications)
"src/appxf_dev/**/*.py" = [
  "S607"
]

[tool.tox]
legacy_tox_ini = """
    [tox]
    isolated_build = True
    env_list = py310, py312

    [gh-actions]
    python =
        3.10: py310
        3.12: py312

    [testenv]
    passenv = APPXF_*
    setenv = PYTHONPATH = {toxinidir}
             VIRTUALENV_DOWNLOAD=0
    deps =
      -r{toxinidir}/requirements.txt
      -r{toxinidir}/requirements_test.txt

    commands = pytest -rA tests/_fixtures/application.py::test_cleanup
               coverage erase
               coverage run --source=appxf --context=UNIT --branch -m pytest -rA ./tests
               coverage report --contexts=UNIT
               coverage html --contexts=UNIT -d cov_html_UNIT
               coverage run -a --source=appxf --context=FEATURE --branch -m pytest -rA ./tests_features
               coverage report --contexts=FEATURE
               coverage html --contexts=FEATURE -d cov_html_FEATURE
               coverage report
               coverage html -d cov_html
"""
# commands = pytest --cov=appxf --cov-report html --cov-report term
# commands = coverage run --source src -m pytest