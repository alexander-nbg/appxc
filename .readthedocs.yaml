version: 2

build:
  os: ubuntu-24.04
  tools:
    python: '3.12'
  jobs:
    post_checkout:
      # Fetch full history and tags so versioning based on Git tags works correctly.
      - git fetch --force --tags --unshallow || git fetch --force --tags
    pre_build:
      - bash dev/_ensure_plantuml_jar.sh
  apt_packages:
    - default-jre-headless

sphinx:
  configuration: doc/conf.py

python:
  install:
    - requirements: doc/requirements.txt
    # Installation of appxc needed for metadata access to package version during sphinx
    # build:
    - method: pip
      path: .
