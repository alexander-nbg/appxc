name: validate-deploy

on:
  workflow_call:
    inputs:
      target-repository:
        required: true
        type: string
      package-version:
        required: true
        type: string
      python-version:
        required: false
        type: string
        default: '3.12'

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}
          cache: 'pip'

      - name: Create venv and install test dependencies
        shell: bash
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -r tests/requirements.txt

      - name: Install appxc from TestPyPI
        if: inputs.target-repository == 'testpypi'
        shell: bash
        run: |
          for attempt in 1 2 3 4 5; do
            if .venv/bin/python -m pip install \
              --index-url https://test.pypi.org/simple/ \
              --extra-index-url https://pypi.org/simple/ \
              appxc==${{ inputs.package-version }}; then
              break
            fi

            if [ "$attempt" -eq 5 ]; then
              exit 1
            fi

            sleep 15
          done

      - name: Install appxc from PyPI
        if: inputs.target-repository == 'pypi'
        shell: bash
        run: .venv/bin/python -m pip install appxc==${{ inputs.package-version }}

      - name: Run tests from checkout
        shell: bash
        run: .venv/bin/python -m pytest -rfE tests
