name: reuse-testing

on:
  workflow_call:
    inputs:
      os:
        required: true
        type: string
      python-version:
        required: false
        type: string
        default: '3.12'
      environment:
        required: false
        type: string
        default: ''

jobs:
  test:
    name: test [${{ inputs.os }}, py${{ inputs.python-version }}]
    runs-on: ${{ inputs.os }}
    environment: ${{ inputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: set up python ${{ inputs.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}

      # note: requirements are not installed since this is handled by TOX within
      # the venv

      - name: Install tox
        run: pip install tox tox-gh-actions
        shell: bash

      - name: Cache .tox directory
        uses: actions/cache@v5
        with:
          path: .tox
          key: tox-${{ runner.os }}-${{ runner.arch }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('**/requirements.txt', 'pyproject.toml') }}
          # no restore key - if something changes, better to fully reinstall

      - name: Run tox
        run: tox
        shell: bash