name: reuse-build

on:
  workflow_call:
    inputs:
      python-version:
        required: false
        type: string
        default: '3.12'
    outputs:
      package_version:
        description: Version reported by the installed built wheel
        value: ${{ jobs.validate.outputs.package_version }}

jobs:
  build:
    name: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # needed to get versions right from tag history

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}
          cache: 'pip'

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Build package
        env:
          SETUPTOOLS_SCM_OVERRIDES_FOR_APPXC: '{local_scheme = "no-local-version"}'
        shell: bash
        run: |
          echo "SETUPTOOLS_SCM_OVERRIDES_FOR_APPXC=$SETUPTOOLS_SCM_OVERRIDES_FOR_APPXC"
          python -m build

      - name: Upload built distributions
        uses: actions/upload-artifact@v6
        with:
          name: dist-${{ github.run_id }}
          path: dist/
          if-no-files-found: error
          retention-days: 7

  validate:
    name: validate
    needs: build
    runs-on: ubuntu-latest
    outputs:
      package_version: ${{ steps.package_version.outputs.package_version }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}
          cache: 'pip'

      - name: Create venv and install test dependencies
        shell: bash
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -r tests/requirements.txt

      - name: Download built distributions
        uses: actions/download-artifact@v8
        with:
          name: dist-${{ github.run_id }}
          path: dist/

      - name: Install wheel package
        shell: bash
        run: |
          .venv/bin/python -m pip install --force-reinstall dist/appxc-*.whl

      - name: Run tests from checkout
        shell: bash
        run: |
          .venv/bin/python -m pytest -rfE tests

      - name: Read installed package version
        id: package_version
        shell: bash
        run: |
          package_version="$(.venv/bin/python -c "from importlib.metadata import version; print(version('appxc'))")"
          echo "package_version=$package_version" >> "$GITHUB_OUTPUT"
