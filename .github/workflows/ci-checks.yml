name: CI Checks
on:
  pull_request: {}
  push:
    branches:
      - main
# Performing sanity checks on pull requests like license headers, ruff and
# unit tests without credentials.

jobs:
  ruff:
    name: linter [ruff]
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          cache: "pip"
          cache-dependency-path: dev/requirements.txt
      - run: pip install -r dev/requirements.txt
      - run: ruff check
      - run: ruff format --check

  basedpyright:
    name: static type checker [basedpyright]
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          cache: "pip"
          cache-dependency-path: dev/requirements.txt
      - run: pip install -r dev/requirements.txt -r requirements.txt
      - run: basedpyright

  license-headers:
    name: license headers
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v4
      - run: dev/check_license_headers.sh

  test-linux:
    name: test linux
    needs: [license-headers, ruff]
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.12']

    runs-on: ${{ matrix.os }}

    steps:
      - id: setup_call
        uses: alexander-nbg/appxf/.github/actions/setup@main
        with:
          python-version: ${{ matrix.python-version }}
          caller-is-appxf: 'yes'
          caller-is-kiss-cf: 'yes'

      - id: run_tox
        uses: alexander-nbg/appxf/.github/actions/run-tox@main

  test-windows:
    name: test windows
    needs: [license-headers, ruff]
    strategy:
      matrix:
        os: [windows-latest]
        python-version: ['3.12']

    runs-on: ${{ matrix.os }}

    steps:
      - id: call_setup
        uses: alexander-nbg/appxf/.github/actions/setup@main
        with:
          python-version: ${{ matrix.python-version }}
          caller-is-appxf: 'yes'
          caller-is-kiss-cf: 'yes'

      - id: run_tox
        uses: alexander-nbg/appxf/.github/actions/run-tox@main
