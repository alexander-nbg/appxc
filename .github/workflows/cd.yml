name: cd

on:
  push:
    branches:
      - main
  pull_request: {}
  release:
    types:
      - published
# TODO LATER: remove the trigger for PRs again

# Run shared checks on main and publish to PyPI after successful validation.

jobs:
  static-checks:
    uses: ./.github/workflows/reuse-static-checks.yml

  tests:
    name: tests [${{ matrix.os }}, py${{ matrix.python-version }}]
    needs: static-checks
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.12']
    uses: ./.github/workflows/reuse-testing.yml
    with:
      os: ${{ matrix.os }}
      python-version: ${{ matrix.python-version }}
      environment: pytest

  deploy-pypi:
    name: deploy [pypi]
    needs: tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # required for OIDC-based authentication to PyPI
    environment:
      name: pypi
    env:
      SETUPTOOLS_SCM_OVERRIDES_FOR_APPXC: '{local_scheme = "no-local-version"}'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
      # TODO: doesn't this caching need to define dependencies concistent to other
      # caching calls?

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Build package
        run: python -m build

      - name: Upload built distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.run_id }}
          path: dist/
          if-no-files-found: error
          retention-days: 2

#      - name: Publish package to PyPI
#        uses: pypa/gh-action-pypi-publish@release/v1
